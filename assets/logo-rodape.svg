<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 80" role="img" aria-label="Ana Celeste PhD — Logotipo">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&amp;display=swap');
      .logo-text { font-family: 'Cormorant Garamond', serif; font-size: 38px; fill: #FFFFFF; }
      .logo-text em { font-style: italic; fill: #FFFFFF; }
      .logo-text strong { font-weight: 500; font-size: 30px; fill: #FFFFFF; letter-spacing: 0.05em; }
    </style>
  </defs>

  <!-- Ícone Baobá (Escalado) -->
  <g transform="translate(10, 10) scale(1.1)">
    <!-- Raízes -->
    <path d="M15 50 Q11 52 8 54" stroke="#FFFFFF" stroke-width="1.1" fill="none" stroke-linecap="round" opacity="0.9"/>
    <path d="M22 51 L22 54"      stroke="#FFFFFF" stroke-width="1.1" fill="none" stroke-linecap="round" opacity="0.9"/>
    <path d="M29 50 Q33 52 36 54" stroke="#FFFFFF" stroke-width="1.1" fill="none" stroke-linecap="round" opacity="0.9"/>

    <!-- Tronco -->
    <path d="M14 50 C12 43 12 36 14 30 C12 26 11 22 9 17 L13 14 L17 11 L22 9 L27 11 L31 14 L35 17 C33 22 32 26 30 30 C32 36 32 43 30 50 Z" fill="#FFFFFF"/>

    <!-- Galhos -->
    <path d="M11 19 Q 4 13  3  6" stroke="#FFFFFF" stroke-width="2.4" fill="none" stroke-linecap="round"/>
    <path d="M33 19 Q40 13 41  6" stroke="#FFFFFF" stroke-width="2.4" fill="none" stroke-linecap="round"/>
    <path d="M22 10 L22  2"       stroke="#FFFFFF" stroke-width="2.0" fill="none" stroke-linecap="round"/>
    <path d="M17 13 Q12  7 10  3" stroke="#FFFFFF" stroke-width="1.7" fill="none" stroke-linecap="round"/>
    <path d="M27 13 Q32  7 34  3" stroke="#FFFFFF" stroke-width="1.7" fill="none" stroke-linecap="round"/>

    <!-- Copa -->
    <ellipse cx="22" cy="4"  rx="6.5" ry="5.0" fill="#FFFFFF" opacity="0.95"/>
    <ellipse cx="11" cy="6"  rx="5.5" ry="4.5" fill="#FFFFFF" opacity="0.95"/>
    <ellipse cx="33" cy="6"  rx="5.5" ry="4.5" fill="#FFFFFF" opacity="0.95"/>
    <ellipse cx=" 4" cy="9"  rx="4.0" ry="4.0" fill="#FFFFFF" opacity="0.85"/>
    <ellipse cx="40" cy="9"  rx="4.0" ry="4.0" fill="#FFFFFF" opacity="0.85"/>
    <ellipse cx="16" cy="2"  rx="4.0" ry="3.5" fill="#FFFFFF" opacity="0.85"/>
    <ellipse cx="28" cy="2"  rx="4.0" ry="3.5" fill="#FFFFFF" opacity="0.85"/>

    <!-- Folha de destaque -->
    <ellipse cx="7" cy="16" rx="4.5" ry="2.8" fill="#FFFFFF" transform="rotate(-38 7 16)" opacity="0.9"/>
  </g>

  <!-- Texto do Logotipo -->
  <text x="75" y="52" class="logo-text">
    Ana <tspan fill="#FFFFFF" font-style="italic">Celeste</tspan> <tspan font-weight="500" font-size="28" fill="#FFFFFF" dx="8">PhD</tspan>
  </text>
</svg>
